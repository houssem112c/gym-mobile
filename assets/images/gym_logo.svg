<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dumbbell Shape -->
  <rect x="20" y="35" width="160" height="10" rx="5" fill="url(#logoGradient)"/>
  <circle cx="30" cy="40" r="15" fill="url(#logoGradient)"/>
  <circle cx="170" cy="40" r="15" fill="url(#logoGradient)"/>
  
  <!-- Text GYM -->
  <text x="100" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#logoGradient)">GYM</text>
</svg>