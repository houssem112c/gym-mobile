name: gym_mobile
description: A mobile app for GYM management system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.2
  
  # Date & Time
  # intl: ^0.18.1
  table_calendar: ^3.0.9
  
  # Maps
  google_maps_flutter: ^2.5.3
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  
  # Video
  video_player: ^2.8.1
  youtube_player_flutter: ^9.1.3
  
  # Storage
  shared_preferences: ^2.5.3
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # Forms
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Add assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
